<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="piechart-hl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <ellipse cx="128" cy="218" rx="66" ry="11" fill="#000" opacity="0.10"/>
  <!-- main disc, centered slightly left of true center to make room for pulled slice -->
  <!-- green segment (large, ~210deg) base circle -->
  <circle cx="120" cy="124" r="78" fill="#3fb04f" stroke="#2f3138" stroke-width="6"/>
  <!-- blue segment: from top (12 o'clock) clockwise to ~ right-bottom -->
  <path d="M120 124 L120 46 A78 78 0 0 1 188 163 Z" fill="#3a7de0" stroke="#2f3138" stroke-width="6" stroke-linejoin="round"/>
  <!-- amber segment: small wedge -->
  <path d="M120 124 L188 163 A78 78 0 0 1 156 190 Z" fill="#f0a830" stroke="#2f3138" stroke-width="6" stroke-linejoin="round"/>
  <!-- highlight sheen across disc -->
  <circle cx="120" cy="124" r="78" fill="url(#piechart-hl)" stroke="none"/>
  <!-- pulled-out red slice, separated to the upper-right -->
  <path d="M150 92 L160 32 A78 78 0 0 1 214 86 Z" fill="#e23b30" stroke="#2f3138" stroke-width="6" stroke-linejoin="round"/>
  <path d="M158 56 L164 40" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.40"/>
</svg>
