<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="editpencil-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7bd54"/>
      <stop offset="1" stop-color="#f0a830"/>
    </linearGradient>
  </defs>
  <ellipse cx="128" cy="220" rx="64" ry="11" fill="#000" opacity="0.10"/>
  <g transform="rotate(45 128 128)">
    <!-- eraser -->
    <rect x="98" y="44" width="60" height="30" rx="10" fill="#ec7d6e" stroke="#2f3138" stroke-width="6"/>
    <!-- metal ferrule -->
    <rect x="98" y="74" width="60" height="18" fill="#c7cdd6" stroke="#2f3138" stroke-width="6"/>
    <!-- body -->
    <rect x="98" y="92" width="60" height="98" fill="url(#editpencil-body)" stroke="#2f3138" stroke-width="6"/>
    <line x1="128" y1="96" x2="128" y2="186" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
    <!-- wood tip -->
    <path d="M98 190 L128 222 L158 190 Z" fill="#e0c08a" stroke="#2f3138" stroke-width="6" stroke-linejoin="round"/>
    <!-- graphite point -->
    <path d="M116 206 L128 222 L140 206 Z" fill="#2f3138" stroke="#2f3138" stroke-width="6" stroke-linejoin="round"/>
  </g>
</svg>
