<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="printer-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a5e68"/>
      <stop offset="1" stop-color="#3a3d45"/>
    </linearGradient>
  </defs>
  <ellipse cx="128" cy="224" rx="62" ry="10" fill="#000" opacity="0.10"/>
  <!-- receipt paper coming out the top -->
  <path d="M86 96 L86 36 L170 36 L170 96 Z" fill="#ffffff" stroke="#2f3138" stroke-width="6" stroke-linejoin="round"/>
  <line x1="102" y1="56" x2="154" y2="56" stroke="#3a7de0" stroke-width="6" stroke-linecap="round"/>
  <line x1="102" y1="72" x2="154" y2="72" stroke="#c7cdd6" stroke-width="6" stroke-linecap="round"/>
  <line x1="102" y1="86" x2="138" y2="86" stroke="#c7cdd6" stroke-width="6" stroke-linecap="round"/>
  <!-- printer body -->
  <rect x="60" y="96" width="136" height="84" rx="16" fill="url(#printer-body)" stroke="#2f3138" stroke-width="6"/>
  <!-- output slot -->
  <rect x="86" y="118" width="84" height="14" rx="7" fill="#2f3138"/>
  <!-- feet/tray -->
  <rect x="84" y="180" width="88" height="26" rx="8" fill="#ffffff" stroke="#2f3138" stroke-width="6"/>
  <!-- status light -->
  <circle cx="170" cy="150" r="9" fill="#3fb04f" stroke="#2f3138" stroke-width="5"/>
</svg>
