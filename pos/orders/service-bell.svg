<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="service-bell-dome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2f5f8"/>
      <stop offset="1" stop-color="#bcc5cf"/>
    </linearGradient>
  </defs>
  <ellipse cx="128" cy="214" rx="60" ry="10" fill="#000" opacity="0.10"/>
  <!-- base -->
  <rect x="48" y="184" width="160" height="18" rx="9" fill="#9aa3ad" stroke="#2f3138" stroke-width="6"/>
  <!-- bell dome -->
  <path d="M58 184 a70 88 0 0 1 140 0 z"
        fill="url(#service-bell-dome)" stroke="#2f3138" stroke-width="6" stroke-linejoin="round"/>
  <!-- neck -->
  <rect x="118" y="74" width="20" height="16" rx="6" fill="#9aa3ad" stroke="#2f3138" stroke-width="6"/>
  <!-- top button -->
  <circle cx="128" cy="64" r="16" fill="#e23b30" stroke="#2f3138" stroke-width="6"/>
  <!-- highlight -->
  <path d="M86 172 a48 60 0 0 1 24 -76" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
</svg>
