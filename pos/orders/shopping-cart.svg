  <line x1="141" y1="74" x2="138" y2="152" stroke="#3a7de0" stroke-width="5" stroke-linecap="round"/>
  <line x1="179" y1="74" x2="180" y2="152" stroke="#3a7de0" stroke-width="5" stroke-linecap="round"/>
  <line x1="75" y1="100" x2="207" y2="100" stroke="#3a7de0" stroke-width="5" stroke-linecap="round"/>
  <line x1="70" y1="126" x2="201" y2="126" stroke="#3a7de0" stroke-width="5" stroke-linecap="round"/>
  <!-- legs to wheels -->
  <path d="M96 152 l-8 22 M196 152 l8 22" fill="none" stroke="#2f3138" stroke-width="6" stroke-linecap="round"/>
  <!-- wheels -->
  <circle cx="104" cy="196" r="14" fill="#3a7de0" stroke="#2f3138" stroke-width="6"/>
  <circle cx="186" cy="196" r="14" fill="#3a7de0" stroke="#2f3138" stroke-width="6"/>
