  <path d="M226 116 a16 14 0 0 0 16 -14" fill="none" stroke="#2f3138" stroke-width="6" stroke-linecap="round"/>
  <!-- highlight sweep -->
  <path d="M70 104 a72 30 0 0 1 116 0" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
</svg>
