<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="food-tray-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f7fa"/>
      <stop offset="1" stop-color="#c7d0d9"/>
    </linearGradient>
  </defs>
  <ellipse cx="128" cy="214" rx="64" ry="11" fill="#000" opacity="0.10"/>
  <!-- tray top surface (angled ellipse) -->
  <ellipse cx="128" cy="120" rx="96" ry="46" fill="url(#food-tray-top)" stroke="#2f3138" stroke-width="6"/>
  <!-- inner rim -->
  <ellipse cx="128" cy="120" rx="78" ry="36" fill="none" stroke="#9aa3ad" stroke-width="5"/>
  <!-- side wall -->
  <path d="M32 120 v16 a96 46 0 0 0 192 0 v-16"
