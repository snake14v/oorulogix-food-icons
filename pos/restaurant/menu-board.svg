<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="menuboard-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f3f6"/>
    </linearGradient>
  </defs>
  <ellipse cx="128" cy="224" rx="58" ry="10" fill="#000" opacity="0.10"/>
  <!-- card -->
  <rect x="62" y="34" width="132" height="184" rx="16" fill="url(#menuboard-card)" stroke="#2f3138" stroke-width="6"/>
  <!-- top emblem circle -->
  <circle cx="128" cy="74" r="24" fill="#fff" stroke="#c98a4b" stroke-width="6"/>
  <!-- fork -->
  <g stroke="#43291a" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="118" y1="62" x2="118" y2="72"/>
    <line x1="124" y1="62" x2="124" y2="72"/>
    <line x1="121" y1="72" x2="121" y2="88"/>
  </g>
  <!-- knife -->
  <path d="M136 62 q8 6 4 18 l-4 8" fill="none" stroke="#43291a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- line items -->
  <line x1="86" y1="124" x2="170" y2="124" stroke="#2f3138" stroke-width="6" stroke-linecap="round"/>
  <circle cx="80" cy="124" r="4" fill="#3a7de0"/>
  <line x1="86" y1="152" x2="170" y2="152" stroke="#2f3138" stroke-width="6" stroke-linecap="round"/>
  <circle cx="80" cy="152" r="4" fill="#3a7de0"/>
  <line x1="86" y1="180" x2="146" y2="180" stroke="#2f3138" stroke-width="6" stroke-linecap="round"/>
  <circle cx="80" cy="180" r="4" fill="#3a7de0"/>
</svg>
