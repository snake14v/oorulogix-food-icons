<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="chair-seat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d99b5c"/>
      <stop offset="1" stop-color="#c98a4b"/>
    </linearGradient>
  </defs>
  <ellipse cx="128" cy="222" rx="58" ry="10" fill="#000" opacity="0.10"/>
  <!-- backrest -->
  <rect x="78" y="44" width="100" height="92" rx="16" fill="#3a3d45" stroke="#2f3138" stroke-width="6"/>
  <!-- backrest slats -->
  <line x1="108" y1="60" x2="108" y2="120" stroke="#2f3138" stroke-width="6" stroke-linecap="round"/>
  <line x1="148" y1="60" x2="148" y2="120" stroke="#2f3138" stroke-width="6" stroke-linecap="round"/>
  <!-- seat -->
  <rect x="68" y="134" width="120" height="30" rx="12" fill="url(#chair-seat)" stroke="#43291a" stroke-width="6"/>
  <!-- front legs -->
  <line x1="84" y1="164" x2="84" y2="206" stroke="#2f3138" stroke-width="11" stroke-linecap="round"/>
  <line x1="172" y1="164" x2="172" y2="206" stroke="#2f3138" stroke-width="11" stroke-linecap="round"/>
  <!-- highlight -->
  <rect x="80" y="140" width="40" height="8" rx="4" fill="#fff" opacity="0.4"/>
</svg>
