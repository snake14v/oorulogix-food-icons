<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="scooter-box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cc35e"/>
      <stop offset="1" stop-color="#3fb04f"/>
    </linearGradient>
  </defs>
  <ellipse cx="128" cy="222" rx="84" ry="11" fill="#000" opacity="0.10"/>
  <!-- rear wheel -->
  <circle cx="74" cy="176" r="32" fill="#3a3d45" stroke="#2f3138" stroke-width="6"/>
  <circle cx="74" cy="176" r="11" fill="#fff" stroke="#2f3138" stroke-width="5"/>
  <!-- front wheel -->
  <circle cx="190" cy="176" r="32" fill="#3a3d45" stroke="#2f3138" stroke-width="6"/>
  <circle cx="190" cy="176" r="11" fill="#fff" stroke="#2f3138" stroke-width="5"/>
  <!-- floor deck / chassis connecting both wheels -->
  <path d="M74 176 L120 176 L150 138 L190 138"
        fill="none" stroke="#3a7de0" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- step-through deck plate -->
  <path d="M104 176 L138 176 L128 196 L94 196 Z" fill="#3a7de0" stroke="#2f3138" stroke-width="5" stroke-linejoin="round"/>
  <!-- seat post + seat -->
  <line x1="120" y1="176" x2="120" y2="128" stroke="#2f3138" stroke-width="9" stroke-linecap="round"/>
  <rect x="58" y="112" width="58" height="20" rx="9" fill="#3a3d45" stroke="#2f3138" stroke-width="6"/>
  <!-- delivery box on back -->
  <rect x="44" y="60" width="58" height="52" rx="8" fill="url(#scooter-box)" stroke="#2f3138" stroke-width="6"/>
  <line x1="54" y1="86" x2="92" y2="86" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
  <line x1="73" y1="70" x2="73" y2="102" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
  <!-- steering column -->
  <line x1="190" y1="138" x2="208" y2="74" stroke="#2f3138" stroke-width="9" stroke-linecap="round"/>
  <!-- handlebar -->
  <line x1="192" y1="74" x2="224" y2="86" stroke="#2f3138" stroke-width="8" stroke-linecap="round"/>
  <!-- front fender -->
  <path d="M168 158 q22 -22 44 0" fill="none" stroke="#3a7de0" stroke-width="10" stroke-linecap="round"/>
  <!-- box highlight -->
  <rect x="50" y="66" width="20" height="7" rx="3" fill="#fff" opacity="0.4"/>
</svg>
