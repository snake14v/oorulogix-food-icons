<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="222" rx="58" ry="11" fill="#000" opacity="0.11"/>
  <defs>
    <linearGradient id="waffle-cone_b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6b573"/>
      <stop offset="0.55" stop-color="#d39a52"/>
      <stop offset="1" stop-color="#b97e36"/>
    </linearGradient>
    <clipPath id="waffle-cone_clip">
      <path d="M128 36 L182 196 Q128 214 74 196 Z"/>
    </clipPath>
  </defs>
  <!-- cone wedge body -->
  <path d="M128 36 L182 196 Q128 214 74 196 Z" fill="url(#waffle-cone_b)" stroke="#7a4f1d" stroke-width="6" stroke-linejoin="round"/>
  <!-- grid texture clipped to wedge -->
  <g clip-path="url(#waffle-cone_clip)" stroke="#9c6a2c" stroke-width="3.5" opacity="0.8">
    <!-- diagonal one way -->
    <path d="M70 70 L210 150"/>
    <path d="M60 100 L210 185"/>
    <path d="M55 130 L200 215"/>
    <path d="M50 160 L185 240"/>
    <path d="M90 40 L215 110"/>
    <!-- diagonal other way -->
    <path d="M186 70 L46 150"/>
    <path d="M196 100 L46 185"/>
    <path d="M201 130 L56 215"/>
    <path d="M206 160 L71 240"/>
    <path d="M166 40 L41 110"/>
  </g>
  <!-- rim band -->
  <path d="M118 38 L138 38 L142 52 L114 52 Z" fill="#e9bd7d" stroke="#7a4f1d" stroke-width="5" stroke-linejoin="round"/>
  <!-- highlight -->
  <path d="M120 60 L150 150" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
</svg>
