<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="222" rx="70" ry="13" fill="#000" opacity="0.11"/>
  <defs>
    <linearGradient id="fudgebrownie_top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b3f22"/>
      <stop offset="1" stop-color="#4a2c17"/>
