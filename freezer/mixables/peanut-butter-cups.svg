<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="222" rx="70" ry="13" fill="#000" opacity="0.11"/>
  <defs>
    <radialGradient id="pbcups_pb" cx="0.42" cy="0.32" r="0.8">
      <stop offset="0" stop-color="#cf9a52"/>
      <stop offset="0.6" stop-color="#b07a3a"/>
      <stop offset="1" stop-color="#8a5c28"/>
    </radialGradient>
    <linearGradient id="pbcups_wrap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a3a22"/>
      <stop offset="1" stop-color="#3a2414"/>
    </linearGradient>
  </defs>
  <!-- back cup (tilted, showing wrapper side) -->
  <g stroke="#2a1a0e" stroke-width="6" stroke-linejoin="round">
    <path d="M150 96 Q186 92 196 120 L188 156 Q160 168 140 150 L142 110 Q144 100 150 96 Z" fill="url(#pbcups_wrap)"/>
    <ellipse cx="170" cy="112" rx="30" ry="16" fill="url(#pbcups_pb)" transform="rotate(-16 170 112)"/>
  </g>
  <!-- front cup top-down: dark fluted wrapper ring + pb top -->
  <g stroke="#2a1a0e" stroke-width="6">
    <ellipse cx="108" cy="150" rx="58" ry="44" fill="url(#pbcups_wrap)"/>
    <ellipse cx="108" cy="142" rx="44" ry="34" fill="url(#pbcups_pb)"/>
  </g>
  <!-- fluted ridges on wrapper -->
  <g stroke="#2a1a0e" stroke-width="3" opacity="0.55">
    <line x1="108" y1="106" x2="108" y2="118"/>
    <line x1="64" y1="138" x2="76" y2="142"/>
    <line x1="152" y1="138" x2="140" y2="142"/>
    <line x1="80" y1="180" x2="88" y2="172"/>
    <line x1="136" y1="180" x2="128" y2="172"/>
    <line x1="108" y1="186" x2="108" y2="176"/>
  </g>
  <!-- pb swirl marks -->
  <path d="M84 142 Q108 130 132 142" fill="none" stroke="#8a5c28" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M90 152 Q108 162 126 152" fill="none" stroke="#8a5c28" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- highlights -->
  <ellipse cx="92" cy="128" rx="14" ry="7" fill="#fff" opacity="0.4"/>
  <ellipse cx="160" cy="104" rx="9" ry="5" fill="#fff" opacity="0.35" transform="rotate(-16 160 104)"/>
</svg>
