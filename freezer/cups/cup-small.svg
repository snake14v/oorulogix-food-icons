<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="222" rx="58" ry="11" fill="#000" opacity="0.11"/>
  <defs>
    <linearGradient id="cupsmall_body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cfe4ee"/>
      <stop offset=".42" stop-color="#eef8fc"/>
      <stop offset=".62" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c2dbe8"/>
    </linearGradient>
    <linearGradient id="cupsmall_rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c9e0ec"/>
    </linearGradient>
    <clipPath id="cupsmall_clip">
      <path d="M86 120 L170 120 L160 206 Q160 210 156 210 L100 210 Q96 210 96 206 Z"/>
    </clipPath>
  </defs>
  <!-- cup body (short) -->
  <path d="M84 116 L172 116 L161 208 Q160 214 154 214 L102 214 Q96 214 95 208 Z"
        fill="url(#cupsmall_body)" stroke="#5a3a1f" stroke-width="6" stroke-linejoin="round"/>
  <!-- inner clipped soft shade on the right -->
  <g clip-path="url(#cupsmall_clip)">
    <path d="M140 120 L172 120 L162 210 L132 210 Z" fill="#9fc4d6" opacity="0.35"/>
  </g>
  <!-- vertical highlight streak -->
  <path d="M108 128 L116 128 L110 200 L103 200 Z" fill="#ffffff" opacity="0.85"/>
  <!-- subtle plastic seam line -->
  <path d="M128 122 L128 206" stroke="#bcd6e3" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <!-- rolled rim -->
  <ellipse cx="128" cy="116" rx="46" ry="13" fill="url(#cupsmall_rim)" stroke="#5a3a1f" stroke-width="6"/>
  <!-- rim inner opening -->
  <ellipse cx="128" cy="116" rx="36" ry="8" fill="#dcecf4" stroke="#7aa6bd" stroke-width="3"/>
  <ellipse cx="128" cy="116" rx="36" ry="8" fill="#bcd9e8" opacity="0.5"/>
  <!-- rim highlight -->
  <path d="M96 110 Q108 104 124 105" stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.9"/>
</svg>
