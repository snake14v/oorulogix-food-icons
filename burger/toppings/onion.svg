<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="206" rx="82" ry="12" fill="#000" opacity="0.11"/>
  <defs>
    <linearGradient id="onion_ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf4e9"/>
      <stop offset="1" stop-color="#e6d6c2"/>
    </linearGradient>
  </defs>
  <!-- back ring -->
  <g transform="translate(150 120)">
    <ellipse cx="0" cy="0" rx="62" ry="26" fill="url(#onion_ring)" stroke="#8a5fa0" stroke-width="6"/>
    <ellipse cx="0" cy="0" rx="40" ry="15" fill="none" stroke="#caa9d0" stroke-width="5"/>
    <ellipse cx="0" cy="0" rx="40" ry="15" fill="#fff" opacity="0.55"/>
  </g>
  <!-- front ring overlapping, draped lower -->
  <g transform="translate(104 138)">
    <ellipse cx="0" cy="0" rx="66" ry="28" fill="url(#onion_ring)" stroke="#8a5fa0" stroke-width="6"/>
    <ellipse cx="0" cy="0" rx="43" ry="16" fill="none" stroke="#caa9d0" stroke-width="5"/>
    <ellipse cx="0" cy="0" rx="43" ry="16" fill="#fff" opacity="0.55"/>
    <!-- highlight on rim -->
    <path d="M-58 -6 Q-30 -26 6 -25" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>
