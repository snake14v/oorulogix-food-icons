<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="powderdarkberry-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6a4a7a"/>
      <stop offset="1" stop-color="#4a2a5a"/>
    </linearGradient>
    <linearGradient id="powderdarkberry-lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a8aa8"/>
      <stop offset="1" stop-color="#6e5e80"/>
    </linearGradient>
  </defs>
  <ellipse cx="128" cy="224" rx="58" ry="11" fill="#000" opacity="0.12"/>
  <!-- spilled mound -->
  <path d="M58 214 q22 -26 70 -26 q48 0 70 26 q-32 10 -70 10 q-38 0 -70 -10 Z" fill="#4a2a5a" stroke="#3c2a1a" stroke-width="6" stroke-linejoin="round"/>
  <path d="M76 206 q20 -12 52 -12 q32 0 52 12" fill="none" stroke="#6a4a7a" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <!-- jar body -->
  <rect x="84" y="92" width="88" height="100" rx="20" fill="url(#powderdarkberry-glass)" stroke="#3c2a1a" stroke-width="6" stroke-linejoin="round"/>
  <!-- powder fill inside -->
  <rect x="90" y="128" width="76" height="58" rx="14" fill="#4a2a5a" opacity="0.85"/>
  <path d="M90 132 q38 -14 76 0" fill="none" stroke="#7a5a8a" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- glass highlight -->
  <rect x="96" y="104" width="14" height="74" rx="7" fill="#ffffff" opacity="0.32"/>
  <!-- neck -->
  <rect x="98" y="76" width="60" height="22" rx="8" fill="#7a5a8a" stroke="#3c2a1a" stroke-width="6" stroke-linejoin="round"/>
  <!-- lid -->
  <rect x="92" y="54" width="72" height="30" rx="12" fill="url(#powderdarkberry-lid)" stroke="#3c2a1a" stroke-width="6" stroke-linejoin="round"/>
  <!-- perforations -->
  <circle cx="112" cy="69" r="3.4" fill="#43291a"/>
  <circle cx="128" cy="66" r="3.4" fill="#43291a"/>
  <circle cx="144" cy="69" r="3.4" fill="#43291a"/>
  <circle cx="120" cy="76" r="3" fill="#43291a"/>
  <circle cx="136" cy="76" r="3" fill="#43291a"/>
  <rect x="98" y="58" width="10" height="20" rx="5" fill="#ffffff" opacity="0.3"/>
</svg>
