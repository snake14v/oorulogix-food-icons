<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="monstershell-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86c562"/>
      <stop offset="1" stop-color="#5a9237"/>
    </linearGradient>
    <linearGradient id="monstershell-cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7e0"/>
      <stop offset="1" stop-color="#f3e3b6"/>
    </linearGradient>
  </defs>
  <ellipse cx="128" cy="224" rx="62" ry="11" fill="#000" opacity="0.12"/>
  <!-- cannoli tube, curved -->
  <path d="M56 96 C56 64 96 56 128 56 C160 56 200 64 200 96 L200 158 C200 192 160 200 128 200 C96 200 56 192 56 158 Z" fill="url(#monstershell-body)" stroke="#3c2a1a" stroke-width="6" stroke-linejoin="round"/>
  <!-- left open end cream -->
  <ellipse cx="72" cy="98" rx="20" ry="30" fill="url(#monstershell-cream)" stroke="#3c2a1a" stroke-width="6"/>
  <ellipse cx="69" cy="92" rx="8" ry="13" fill="#fffdf2" opacity="0.7"/>
  <!-- right open end cream -->
  <ellipse cx="184" cy="98" rx="20" ry="30" fill="url(#monstershell-cream)" stroke="#3c2a1a" stroke-width="6"/>
  <ellipse cx="181" cy="92" rx="8" ry="13" fill="#fffdf2" opacity="0.7"/>
  <!-- diagonal shell ridges -->
  <path d="M96 70 L78 196" stroke="#43291a" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
  <path d="M128 64 L128 200" stroke="#43291a" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
  <path d="M160 70 L178 196" stroke="#43291a" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
  <!-- highlight -->
  <path d="M84 78 C100 70 116 70 124 76" stroke="#bfe6a0" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- goofy candy eyes -->
  <circle cx="112" cy="126" r="18" fill="#fff" stroke="#3c2a1a" stroke-width="5"/>
  <circle cx="150" cy="134" r="14" fill="#fff" stroke="#3c2a1a" stroke-width="5"/>
  <circle cx="116" cy="130" r="7" fill="#2a1c12"/>
  <circle cx="153" cy="137" r="6" fill="#2a1c12"/>
  <circle cx="118" cy="127" r="2.5" fill="#fff"/>
  <circle cx="155" cy="134" r="2" fill="#fff"/>
  <!-- little smile -->
  <path d="M118 162 Q132 176 150 160" stroke="#3c2a1a" stroke-width="5" stroke-linecap="round" fill="none"/>
