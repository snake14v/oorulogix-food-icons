<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="226" rx="52" ry="11" fill="#000" opacity="0.12"/>
  <defs>
    <linearGradient id="milk-skim_body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e6e6df"/>
      <stop offset=".45" stop-color="#f4f4ef"/>
      <stop offset="1" stop-color="#d9d9d0"/>
