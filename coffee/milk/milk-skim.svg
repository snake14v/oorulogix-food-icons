  <!-- label panel -->
  <rect x="104" y="120" width="48" height="58" rx="6" fill="#fff" opacity="0.95" stroke="#43291a" stroke-width="4"/>
  <!-- blue accent band -->
  <rect x="104" y="120" width="48" height="16" rx="6" fill="#5b9bd5" stroke="#43291a" stroke-width="4"/>
