<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="226" rx="50" ry="10" fill="#000" opacity="0.12"/>
  <defs>
    <linearGradient id="cup-medium_body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D8B27E"/>
      <stop offset=".45" stop-color="#E7CFA6"/>
      <stop offset="1" stop-color="#CFA468"/>
    </linearGradient>
    <linearGradient id="cup-medium_lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6e4f33"/>
      <stop offset="1" stop-color="#5a3f28"/>
    </linearGradient>
  </defs>
  <!-- domed lid -->
  <path d="M84 70 Q128 42 172 70 L172 77 Q128 61 84 77 Z" fill="url(#cup-medium_lid)" stroke="#3c2a1a" stroke-width="6" stroke-linejoin="round"/>
  <!-- lid rim -->
  <rect x="80" y="75" width="96" height="17" rx="7" fill="#4a3320" stroke="#3c2a1a" stroke-width="6" stroke-linejoin="round"/>
  <!-- sip hole -->
  <ellipse cx="128" cy="56" rx="10" ry="5" fill="#2e2013"/>
  <!-- cup body (medium, taller): top half-width 45, bottom half-width 32 -->
  <path d="M83 92 L173 92 L162 216 Q161 222 153 222 L103 222 Q95 222 94 216 Z" fill="url(#cup-medium_body)" stroke="#4a2f1a" stroke-width="6" stroke-linejoin="round"/>
  <!-- coffee sleeve band -->
  <path d="M89 138 L167 138 L163 182 L93 182 Z" fill="#C98A4B" stroke="#4a2f1a" stroke-width="6" stroke-linejoin="round"/>
  <!-- sleeve highlight ridge -->
  <path d="M93 148 L163 148" stroke="#E2A968" stroke-width="4" stroke-linecap="round"/>
  <!-- body highlight -->
  <path d="M101 100 L97 214" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
</svg>
