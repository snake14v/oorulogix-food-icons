<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="226" rx="74" ry="12" fill="#000" opacity="0.12"/>
  <defs>
    <linearGradient id="cannoli-battenberg_cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff8ec"/>
