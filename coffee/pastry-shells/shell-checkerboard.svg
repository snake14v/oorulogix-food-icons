      <rect x="150" y="46" width="26" height="26" fill="#f6dd6e"/>
      <rect x="202" y="46" width="26" height="26" fill="#f6dd6e"/>
      <rect x="20" y="72"  width="26" height="26" fill="#f6dd6e"/>
      <rect x="72" y="72"  width="26" height="26" fill="#f6dd6e"/>
      <rect x="124" y="72" width="26" height="26" fill="#f6dd6e"/>
      <rect x="176" y="72" width="26" height="26" fill="#f6dd6e"/>
      <rect x="46" y="98"  width="26" height="26" fill="#f6dd6e"/>
      <rect x="98" y="98"  width="26" height="26" fill="#f6dd6e"/>
