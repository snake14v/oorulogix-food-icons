<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="226" rx="62" ry="11" fill="#000" opacity="0.12"/>
  <defs>
    <linearGradient id="powder-hibiscus_glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dff0f3"/>
      <stop offset="0.5" stop-color="#f4fbfc"/>
      <stop offset="1" stop-color="#c9e2e8"/>
    </linearGradient>
    <linearGradient id="powder-hibiscus_fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0497e"/>
      <stop offset="1" stop-color="#a81049"/>
    </linearGradient>
    <linearGradient id="powder-hibiscus_lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7eaee"/>
      <stop offset="1" stop-color="#b3bcc6"/>
    </linearGradient>
    <clipPath id="powder-hibiscus_clip">
      <path d="M86 96 L170 96 L165 196 Q163 210 150 210 L106 210 Q93 210 91 196 Z"/>
    </clipPath>
  </defs>
  <!-- spilled mound -->
  <path d="M64 212 Q90 192 128 196 Q150 198 168 210 Q176 215 168 218 L72 218 Q58 216 64 212 Z" fill="#c2185b" stroke="#4a2f1a" stroke-width="6" stroke-linejoin="round"/>
  <path d="M82 206 Q104 198 122 204" fill="none" stroke="#f070a0" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <!-- glass jar body -->
  <path d="M86 96 L170 96 L165 196 Q163 210 150 210 L106 210 Q93 210 91 196 Z" fill="url(#powder-hibiscus_glass)" stroke="#4a2f1a" stroke-width="6" stroke-linejoin="round"/>
  <!-- powder fill inside -->
  <g clip-path="url(#powder-hibiscus_clip)">
    <path d="M84 140 Q128 128 172 140 L172 212 L84 212 Z" fill="url(#powder-hibiscus_fill)"/>
    <path d="M84 140 Q128 128 172 140" fill="none" stroke="#f070a0" stroke-width="4" opacity="0.7"/>
  </g>
  <!-- glass highlight -->
  <path d="M98 108 L94 190" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <!-- lid -->
  <rect x="84" y="74" width="88" height="26" rx="8" fill="url(#powder-hibiscus_lid)" stroke="#4a2f1a" stroke-width="6" stroke-linejoin="round"/>
  <!-- perforations -->
  <g fill="#4a2f1a">
    <circle cx="104" cy="87" r="3.4"/>
    <circle cx="120" cy="87" r="3.4"/>
    <circle cx="136" cy="87" r="3.4"/>
    <circle cx="152" cy="87" r="3.4"/>
  </g>
  <rect x="88" y="78" width="80" height="6" rx="3" fill="#fff" opacity="0.45"/>
</svg>
