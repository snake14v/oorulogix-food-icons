    </linearGradient>
    <linearGradient id="espresso-new-england-roast_saucer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d6dde0"/>
