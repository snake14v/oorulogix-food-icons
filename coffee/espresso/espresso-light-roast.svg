  <!-- Glass body -->
  <path d="M92 96 Q90 92 96 92 L160 92 Q166 92 164 96 L150 180 Q149 190 138 190 L118 190 Q107 190 106 180 Z" fill="url(#espresso-new-england-roast_glass)" stroke="#5a3a1f" stroke-width="6" stroke-linejoin="round"/>
