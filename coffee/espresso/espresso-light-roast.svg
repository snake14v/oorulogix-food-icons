<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="226" rx="58" ry="11" fill="#000" opacity="0.12"/>
  <defs>
    <linearGradient id="espresso-new-england-roast_glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eef4f6"/>
      <stop offset=".5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cdd9de"/>
    </linearGradient>
    <linearGradient id="espresso-new-england-roast_liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8f5b34"/>
