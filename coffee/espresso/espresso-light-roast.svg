  </defs>
  <!-- Saucer -->
  <ellipse cx="128" cy="200" rx="70" ry="18" fill="url(#espresso-new-england-roast_saucer)" stroke="#5a3a1f" stroke-width="6" stroke-linejoin="round"/>
