<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="onions-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf4ea"/>
      <stop offset="100%" stop-color="#f0e6d8"/>
    </linearGradient>
  </defs>
  <ellipse cx="128" cy="222" rx="86" ry="13" fill="#000" opacity="0.10"/>

  <!-- sliver 1 (back, long curved C ring) -->
  <g>
    <path d="M64 96 Q70 62 118 64 Q160 68 162 100"
          fill="none" stroke="#8f7d63" stroke-width="19" stroke-linecap="round"/>
    <path d="M64 96 Q70 62 118 64 Q160 68 162 100"
          fill="none" stroke="url(#onions-grad)" stroke-width="13" stroke-linecap="round"/>
    <path d="M64 96 Q70 62 118 64 Q160 68 162 100"
          fill="none" stroke="#d9c9b2" stroke-width="13" stroke-linecap="round" opacity="0.35" transform="translate(0,3.5)"/>
    <path d="M78 80 Q108 70 144 82" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- sliver 2 (mid, thinner) -->
  <g>
    <path d="M88 118 Q132 104 182 120"
          fill="none" stroke="#8f7d63" stroke-width="17" stroke-linecap="round"/>
    <path d="M88 118 Q132 104 182 120"
          fill="none" stroke="url(#onions-grad)" stroke-width="11" stroke-linecap="round"/>
    <path d="M96 120 Q134 110 174 122" fill="none" stroke="#d9c9b2" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- sliver 3 (curved ring right) -->
  <g>
    <path d="M188 132 Q204 158 184 184 Q166 200 144 190"
          fill="none" stroke="#8f7d63" stroke-width="18" stroke-linecap="round"/>
    <path d="M188 132 Q204 158 184 184 Q166 200 144 190"
