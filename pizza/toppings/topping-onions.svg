    <path d="M188 138 Q200 158 184 178" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- sliver 4 (front, short) -->
  <g>
    <path d="M66 152 Q98 136 132 152"
          fill="none" stroke="#8f7d63" stroke-width="18" stroke-linecap="round"/>
    <path d="M66 152 Q98 136 132 152"
          fill="none" stroke="url(#onions-grad)" stroke-width="12" stroke-linecap="round"/>
    <path d="M74 150 Q100 140 124 150" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- sliver 5 (front-left, small curl) -->
  <g>
    <path d="M72 180 Q92 168 116 178"
          fill="none" stroke="#8f7d63" stroke-width="16" stroke-linecap="round"/>
    <path d="M72 180 Q92 168 116 178"
