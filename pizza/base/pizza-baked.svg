<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="baked-crust" cx="0.42" cy="0.4" r="0.62">
      <stop offset="0.7" stop-color="#e9b265"/>
      <stop offset="1" stop-color="#e0a24b"/>
    </radialGradient>
    <radialGradient id="baked-cheese" cx="0.42" cy="0.4" r="0.72">
      <stop offset="0" stop-color="#f6d985"/>
      <stop offset="1" stop-color="#f2cd6e"/>
    </radialGradient>
    <clipPath id="baked-clip">
      <circle cx="128" cy="118" r="76"/>
    </clipPath>
    <clipPath id="baked-crust-ring">
      <circle cx="128" cy="118" r="92"/>
    </clipPath>
  </defs>
  <ellipse cx="128" cy="222" rx="90" ry="13" fill="#000" opacity="0.10"/>
  <!-- deep golden crust -->
  <circle cx="128" cy="118" r="92" fill="url(#baked-crust)" stroke="#9a5f25" stroke-width="6"/>
  <!-- browned crust flecks -->
  <g fill="#c47f33" opacity="0.55" clip-path="url(#baked-crust-ring)">
    <ellipse cx="128" cy="34" rx="9" ry="5"/>
    <ellipse cx="60" cy="72" rx="8" ry="5" transform="rotate(40 60 72)"/>
    <ellipse cx="200" cy="78" rx="8" ry="5" transform="rotate(-40 200 78)"/>
    <ellipse cx="40" cy="150" rx="7" ry="5" transform="rotate(70 40 150)"/>
    <ellipse cx="214" cy="150" rx="7" ry="5" transform="rotate(-70 214 150)"/>
    <ellipse cx="128" cy="202" rx="9" ry="5"/>
  </g>
  <!-- melted bubbly cheese -->
  <circle cx="128" cy="118" r="78" fill="url(#baked-cheese)" stroke="#dba93f" stroke-width="5"/>
  <!-- melt pooling texture -->
  <g clip-path="url(#baked-clip)" fill="#f7df90" stroke="#e6c25d" stroke-width="3">
    <path d="M86 92 Q108 80 128 90 Q150 80 168 96 Q176 116 162 132 Q172 152 152 162
      Q132 174 110 162 Q86 168 78 146 Q68 124 80 108 Q82 98 86 92 Z" opacity="0.7"/>
  </g>
  <!-- browned cheese spots (bubbles) -->
  <g clip-path="url(#baked-clip)">
    <circle cx="100" cy="92" r="9" fill="#cf8a3a"/>
    <circle cx="100" cy="92" r="5" fill="#e3a955"/>
    <circle cx="150" cy="100" r="8" fill="#cf8a3a"/>
    <circle cx="150" cy="100" r="4.5" fill="#e3a955"/>
    <circle cx="172" cy="134" r="7" fill="#cf8a3a"/>
    <circle cx="172" cy="134" r="4" fill="#e3a955"/>
    <circle cx="118" cy="150" r="9" fill="#cf8a3a"/>
    <circle cx="118" cy="150" r="5" fill="#e3a955"/>
    <circle cx="84" cy="132" r="7" fill="#cf8a3a"/>
    <circle cx="84" cy="132" r="4" fill="#e3a955"/>
    <circle cx="152" cy="156" r="6.5" fill="#cf8a3a"/>
    <circle cx="152" cy="156" r="3.6" fill="#e3a955"/>
    <circle cx="128" cy="116" r="6" fill="#cf8a3a"/>
    <circle cx="128" cy="116" r="3.4" fill="#e3a955"/>
