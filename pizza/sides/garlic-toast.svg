<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="ctexas-crust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#edc074"/>
      <stop offset="1" stop-color="#e0a64c"/>
    </linearGradient>
    <linearGradient id="ctexas-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5e2b4"/>
      <stop offset="1" stop-color="#ecd49a"/>
    </linearGradient>
    <linearGradient id="ctexas-butter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7e9bf"/>
      <stop offset="1" stop-color="#f0d9a6"/>
    </linearGradient>
    <clipPath id="ctexas-topclip">
      <path d="M48 70 L196 56 L214 90 L70 110 Z"/>
    </clipPath>
  </defs>

  <!-- contact shadow -->
  <ellipse cx="128" cy="206" rx="80" ry="13" fill="#000" opacity="0.12"/>

  <!-- front (3/4) face of the thick slice -->
  <path d="M48 70 L70 110 L62 178 Q60 190 78 192 L196 178 Q210 176 210 162 L214 90 L196 56 Z"
        fill="url(#ctexas-crust)" stroke="#9a5f25" stroke-width="6" stroke-linejoin="round"/>

  <!-- crumb / front side lighter inset -->
  <path d="M72 112 L66 174 Q65 182 78 184 L192 172 Q200 170 200 160 L203 96 Z"
        fill="#f0d9a6" stroke="#c98a3e" stroke-width="4" stroke-linejoin="round"/>

  <!-- toasted garlic-butter TOP surface -->
  <path d="M48 70 L196 56 L214 90 L70 110 Z"
        fill="url(#ctexas-top)" stroke="#9a5f25" stroke-width="6" stroke-linejoin="round"/>

  <!-- glossy butter sheen on top -->
  <g clip-path="url(#ctexas-topclip)">
    <path d="M58 74 L188 61 L204 86 L78 104 Z" fill="url(#ctexas-butter)" opacity="0.85"/>
    <path d="M64 76 L150 69 Q170 67 176 76 Q150 80 100 88 Q72 92 64 86 Z" fill="#fbf1d2" opacity="0.7"/>
    <!-- toast/grill diagonal marks -->
    <path d="M70 102 L120 64" stroke="#b9742e" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
    <path d="M100 106 L150 66" stroke="#b9742e" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <path d="M132 108 L182 66" stroke="#b9742e" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- parsley flecks -->
  <g fill="#4f8a2e">
    <circle cx="86" cy="84" r="3.2"/>
    <circle cx="120" cy="78" r="2.6"/>
    <circle cx="150" cy="74" r="3"/>
    <circle cx="178" cy="72" r="2.4"/>
    <circle cx="104" cy="94" r="2.4"/>
    <circle cx="140" cy="90" r="3"/>
    <circle cx="168" cy="84" r="2.6"/>
    <circle cx="74" cy="96" r="2.2"/>
    <ellipse cx="132" cy="82" rx="3.4" ry="2" transform="rotate(-25 132 82)"/>
    <ellipse cx="158" cy="92" rx="3" ry="1.8" transform="rotate(-20 158 92)"/>
  </g>

  <!-- chopped garlic bits -->
  <g fill="#f0e6cf" stroke="#d9c79f" stroke-width="1.4">
    <ellipse cx="96" cy="80" rx="4.4" ry="3" transform="rotate(-18 96 80)"/>
    <ellipse cx="146" cy="84" rx="4" ry="2.8" transform="rotate(-22 146 84)"/>
    <ellipse cx="116" cy="90" rx="3.6" ry="2.6" transform="rotate(-15 116 90)"/>
    <ellipse cx="172" cy="78" rx="3.8" ry="2.6" transform="rotate(-20 172 78)"/>
  </g>

  <!-- butter drip on front edge -->
  <path d="M150 178 Q152 188 158 188 Q164 188 162 176 Z" fill="#f7e9bf" stroke="#d9b86a" stroke-width="2.5" stroke-linejoin="round"/>
</svg>
