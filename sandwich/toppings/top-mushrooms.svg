<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="214" rx="74" ry="13" fill="#000" opacity="0.12"/>
  <defs>
    <linearGradient id="top-mushrooms_cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6d3b2"/>
      <stop offset="1" stop-color="#d8c2a0"/>
    </linearGradient>
  </defs>
  <!-- sliced mushroom pieces, classic keyhole cross-section -->
  <g stroke="#5a3a1f" stroke-width="6" stroke-linejoin="round">
    <!-- back slice -->
    <path d="M88 116 q-30 0 -30 18 q0 12 16 12 q4 18 14 18 q10 0 14 -18 q16 0 16 -12 q0 -18 -30 -18 z" fill="url(#top-mushrooms_cap)"/>
    <!-- right back slice -->
    <path d="M168 112 q-28 0 -28 17 q0 11 15 11 q4 16 13 16 q9 0 13 -16 q15 0 15 -11 q0 -17 -28 -17 z" fill="url(#top-mushrooms_cap)"/>
    <!-- middle left -->
    <path d="M70 150 q-32 0 -32 19 q0 13 17 13 q4 19 15 19 q11 0 15 -19 q17 0 17 -13 q0 -19 -32 -19 z" fill="url(#top-mushrooms_cap)"/>
    <!-- middle right -->
    <path d="M158 152 q-30 0 -30 18 q0 12 16 12 q4 18 14 18 q10 0 14 -18 q16 0 16 -12 q0 -18 -30 -18 z" fill="url(#top-mushrooms_cap)"/>
    <!-- front center -->
    <path d="M116 178 q-31 0 -31 19 q0 12 16 12 q4 18 15 18 q11 0 15 -18 q16 0 16 -12 q0 -19 -31 -19 z" fill="url(#top-mushrooms_cap)"/>
  </g>
  <!-- darker gills (the stalk/underside lines) -->
  <g stroke="#a07d4e" stroke-width="3.5" stroke-linecap="round" opacity="0.85">
    <path d="M88 138 l0 22"/><path d="M82 140 l-2 16"/><path d="M94 140 l2 16"/>
    <path d="M168 134 l0 20"/><path d="M162 136 l-2 14"/><path d="M174 136 l2 14"/>
    <path d="M70 172 l0 24"/><path d="M63 174 l-2 18"/><path d="M77 174 l2 18"/>
    <path d="M158 174 l0 22"/><path d="M151 176 l-2 16"/><path d="M165 176 l2 16"/>
    <path d="M116 200 l0 24"/><path d="M109 202 l-2 18"/><path d="M123 202 l2 18"/>
  </g>
  <!-- cap highlights -->
  <path d="M68 122 q14 -8 34 -5" stroke="#f4ead2" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M52 158 q14 -8 34 -5" stroke="#f4ead2" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M98 186 q14 -8 34 -5" stroke="#f4ead2" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.9"/>
</svg>
