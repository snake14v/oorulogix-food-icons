<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- grilled cheese pulled apart with cheese stretch -->
  <ellipse cx="128" cy="206" rx="90" ry="14" fill="#000" opacity="0.12"/>
  <defs>
    <linearGradient id="gch_bread" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f1c06f"/><stop offset="1" stop-color="#d99a44"/></linearGradient>
  </defs>
  <!-- stretchy cheese strings between halves -->
  <g fill="none" stroke="#f4b53c" stroke-width="7" stroke-linecap="round">
    <path d="M108 138 Q128 120 148 138"/>
    <path d="M106 158 Q128 146 150 158"/>
    <path d="M110 176 Q128 168 146 176"/>
  </g>
  <!-- left half (right-triangle, cut face on the right) -->
  <path d="M40 184 L110 184 L110 92 Z" fill="url(#gch_bread)" stroke="#9a5f25" stroke-width="6" stroke-linejoin="round"/>
  <rect x="100" y="126" width="12" height="46" rx="3" fill="#f8be3c" stroke="#c8841a" stroke-width="4"/>
  <!-- right half (cut face on the left) -->
  <path d="M216 184 L146 184 L146 92 Z" fill="url(#gch_bread)" stroke="#9a5f25" stroke-width="6" stroke-linejoin="round"/>
  <rect x="144" y="126" width="12" height="46" rx="3" fill="#f8be3c" stroke="#c8841a" stroke-width="4"/>
  <!-- grill marks -->
  <g stroke="#b06f2a" stroke-width="6" stroke-linecap="round" opacity="0.5">
    <line x1="58" y1="168" x2="74" y2="150"/><line x1="74" y1="172" x2="94" y2="146"/>
    <line x1="166" y1="150" x2="182" y2="168"/><line x1="158" y1="146" x2="182" y2="172"/>
  </g>
</svg>
