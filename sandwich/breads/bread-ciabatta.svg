<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="216" rx="76" ry="12" fill="#000" opacity="0.12"/>
  <defs>
    <linearGradient id="bread-ciabatta_top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d49c"/>
      <stop offset="1" stop-color="#e0bc80"/>
    </linearGradient>
    <linearGradient id="bread-ciabatta_side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9b073"/>
      <stop offset="1" stop-color="#c0954f"/>
    </linearGradient>
  </defs>
  <!-- elongated airy roll, slight 3/4 -->
  <!-- side -->
  <path d="M40 142 Q40 162 64 168 L192 168 Q216 162 216 142 L216 132 L40 132 Z"
        fill="url(#bread-ciabatta_side)" stroke="#5a3a1f" stroke-width="6" stroke-linejoin="round"/>
  <!-- domed top -->
  <path d="M40 138 Q40 104 76 100 Q128 94 180 100 Q216 104 216 138 Q216 150 192 152 L64 152 Q40 150 40 138 Z"
        fill="url(#bread-ciabatta_top)" stroke="#5a3a1f" stroke-width="6" stroke-linejoin="round"/>
  <!-- flour dusting on top -->
  <g fill="#fff" opacity="0.6">
    <circle cx="72" cy="118" r="2.2"/><circle cx="104" cy="112" r="2"/><circle cx="140" cy="114" r="2.4"/>
    <circle cx="174" cy="120" r="2"/><circle cx="120" cy="128" r="2"/><circle cx="90" cy="130" r="1.8"/>
    <circle cx="158" cy="130" r="1.8"/>
  </g>
  <!-- visible air holes (open crumb) along cut edge -->
  <g fill="#c79a58" opacity="0.85">
    <ellipse cx="68" cy="144" rx="5" ry="3.4"/><ellipse cx="96" cy="146" rx="6" ry="4"/>
    <ellipse cx="128" cy="145" rx="7" ry="4.4"/><ellipse cx="158" cy="146" rx="6" ry="4"/>
    <ellipse cx="186" cy="144" rx="5" ry="3.4"/>
  </g>
  <!-- highlight -->
  <path d="M64 108 Q120 100 176 108" stroke="#fff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.4"/>
</svg>
