<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="218" rx="66" ry="12" fill="#000" opacity="0.12"/>
  <defs>
    <linearGradient id="bread-marble-rye_crust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a87a4c"/>
      <stop offset="1" stop-color="#8a5f38"/>
    </linearGradient>
    <clipPath id="bread-marble-rye_clip">
      <ellipse cx="128" cy="128" rx="58" ry="68"/>
    </clipPath>
  </defs>
  <!-- oval slice crust -->
  <ellipse cx="128" cy="128" rx="64" ry="74" fill="url(#bread-marble-rye_crust)" stroke="#3c2a1a" stroke-width="6"/>
  <!-- crumb base (tan) -->
  <ellipse cx="128" cy="128" rx="58" ry="68" fill="#c9a86a" stroke="#8a5f38" stroke-width="4"/>
  <!-- swirled marble: dark rye ribbons clipped to crumb -->
  <g clip-path="url(#bread-marble-rye_clip)">
    <path d="M70 80 Q110 96 100 130 Q92 162 140 168 Q186 174 172 130" fill="none" stroke="#6e4a2e" stroke-width="11" stroke-linecap="round"/>
    <path d="M82 70 Q120 84 112 116 Q104 150 150 152" fill="none" stroke="#6e4a2e" stroke-width="9" stroke-linecap="round"/>
    <path d="M160 78 Q138 104 168 118 Q190 128 170 156" fill="none" stroke="#6e4a2e" stroke-width="9" stroke-linecap="round"/>
    <path d="M86 150 Q120 158 122 184" fill="none" stroke="#6e4a2e" stroke-width="8" stroke-linecap="round"/>
    <!-- light tan ribbons to read as swirl -->
    <path d="M96 92 Q128 104 124 134" fill="none" stroke="#d8c08a" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <path d="M150 96 Q138 120 158 132" fill="none" stroke="#d8c08a" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  </g>
  <ellipse cx="128" cy="128" rx="58" ry="68" fill="none" stroke="#8a5f38" stroke-width="4"/>
  <!-- highlight -->
  <path d="M96 80 Q112 70 130 72" stroke="#fff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.3"/>
</svg>
