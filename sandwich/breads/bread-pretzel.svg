<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="216" rx="66" ry="12" fill="#000" opacity="0.12"/>
  <defs>
    <radialGradient id="bread-pretzel_top" cx="0.42" cy="0.34" r="0.8">
      <stop offset="0" stop-color="#a86d34"/>
      <stop offset="1" stop-color="#7a4d22"/>
    </radialGradient>
    <linearGradient id="bread-pretzel_side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#744a22"/>
      <stop offset="1" stop-color="#5c3917"/>
    </linearGradient>
  </defs>
  <!-- round pretzel bun, slight 3/4 -->
  <!-- bottom thickness -->
  <ellipse cx="128" cy="140" rx="74" ry="60" fill="url(#bread-pretzel_side)" stroke="#3c2a1a" stroke-width="6"/>
  <!-- glossy mahogany top dome -->
  <ellipse cx="128" cy="128" rx="74" ry="60" fill="url(#bread-pretzel_top)" stroke="#3c2a1a" stroke-width="6"/>
  <!-- score line (classic pretzel-bun slash) -->
  <path d="M80 108 Q128 96 176 108" stroke="#caa05a" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M82 110 Q128 100 174 110" stroke="#5c3917" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- glossy highlight -->
  <ellipse cx="104" cy="104" rx="26" ry="13" fill="#fff" opacity="0.22" transform="rotate(-18 104 104)"/>
  <!-- scattered salt grains -->
  <g fill="#fdfdf7" stroke="#d8d2bd" stroke-width="0.8">
    <rect x="98" y="128" width="5" height="5" rx="1.2" transform="rotate(20 100 130)"/>
    <rect x="130" y="120" width="5" height="5" rx="1.2" transform="rotate(-15 132 122)"/>
    <rect x="150" y="138" width="5" height="5" rx="1.2" transform="rotate(30 152 140)"/>
    <rect x="116" y="146" width="5" height="5" rx="1.2" transform="rotate(-25 118 148)"/>
    <rect x="84" y="146" width="4.5" height="4.5" rx="1.2" transform="rotate(12 86 148)"/>
    <rect x="142" y="158" width="4.5" height="4.5" rx="1.2" transform="rotate(-10 144 160)"/>
    <rect x="120" y="160" width="4.5" height="4.5" rx="1.2" transform="rotate(22 122 162)"/>
    <rect x="166" y="120" width="4.5" height="4.5" rx="1.2" transform="rotate(-20 168 122)"/>
  </g>
</svg>
