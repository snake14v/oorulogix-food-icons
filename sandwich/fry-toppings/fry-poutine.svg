    <path d="M82 122 q14 -10 26 0 q6 12 -6 18 q-16 6 -24 -6 q-2 -8 4 -12 Z" fill="url(#poutine_curd)"/>
    <path d="M138 110 q14 -8 24 2 q4 12 -8 16 q-15 4 -22 -8 q-1 -7 6 -10 Z" fill="url(#poutine_curd)"/>
    <path d="M110 150 q15 -8 26 2 q4 12 -8 18 q-16 6 -24 -8 q-2 -8 6 -12 Z" fill="url(#poutine_curd)"/>
    <path d="M150 152 q13 -6 22 4 q3 11 -8 15 q-14 3 -20 -8 q-1 -7 6 -11 Z" fill="url(#poutine_curd)"/>
    <path d="M70 158 q12 -6 20 2 q4 11 -6 15 q-14 4 -20 -7 q-1 -6 6 -10 Z" fill="url(#poutine_curd)"/>
  </g>
  <!-- curd highlights -->
  <g fill="#fffdf2" opacity="0.8">
    <ellipse cx="92" cy="126" rx="7" ry="4"/>
    <ellipse cx="148" cy="114" rx="6" ry="3.5"/>
    <ellipse cx="120" cy="154" rx="7" ry="4"/>
