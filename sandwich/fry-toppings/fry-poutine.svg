  </defs>
  <!-- gravy pool -->
  <path d="M58 138
    q-10 -26 16 -36 q18 -12 32 0
    q14 -16 36 -8 q20 8 16 28
    q24 -2 22 24 q-2 22 -32 24
    q-10 16 -38 12 q-26 0 -32 -22
    q-24 0 -20 -24 q2 -16 0 -20 Z"
