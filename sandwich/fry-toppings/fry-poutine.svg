<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="216" rx="78" ry="14" fill="#000" opacity="0.12"/>
  <defs>
    <linearGradient id="poutine_gravy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86532f"/>
      <stop offset="1" stop-color="#5c3620"/>
    </linearGradient>
    <radialGradient id="poutine_curd" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#fdf6e2"/>
      <stop offset="1" stop-color="#eadfbe"/>
