<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="chocolate-crust-bowl" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#7a4a28"/>
      <stop offset="60%" stop-color="#5a3418"/>
      <stop offset="100%" stop-color="#3d2310"/>
    </radialGradient>
    <linearGradient id="chocolate-crust-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5e3a20"/>
      <stop offset="100%" stop-color="#3a2110"/>
    </linearGradient>
    <radialGradient id="chocolate-crust-hollow" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#321c0d"/>
      <stop offset="100%" stop-color="#22130a"/>
    </radialGradient>
  </defs>

  <ellipse cx="128" cy="220" rx="84" ry="13" fill="#000" opacity="0.11"/>

  <!-- outer shell body -->
  <path d="M40 124
           C40 96 80 80 128 80
           C176 80 216 96 216 124
           C216 156 176 184 128 184
           C80 184 40 156 40 124 Z"
        fill="url(#chocolate-crust-bowl)" stroke="#3a2110" stroke-width="6" stroke-linejoin="round"/>

  <!-- fluted rim (scalloped top edge) -->
  <path d="M44 116
           q9 -16 18 0 q9 -16 18 0 q9 -16 18 0 q9 -16 18 0 q9 -16 18 0
           q9 -16 18 0 q9 -16 18 0 q9 -16 18 0 q9 -16 18 0
           q9 16 0 22 q-86 26 -180 0 q-9 -6 0 -22 Z"
        fill="url(#chocolate-crust-rim)" stroke="#3a2110" stroke-width="6" stroke-linejoin="round"/>

  <!-- hollow interior -->
  <ellipse cx="128" cy="120" rx="68" ry="34" fill="url(#chocolate-crust-hollow)" stroke="#2c1809" stroke-width="5"/>
  <!-- inner wall shading -->
  <ellipse cx="128" cy="116" rx="56" ry="27" fill="#3a2210" opacity="0.55"/>

  <!-- highlight on rim -->
  <path d="M62 102 q24 -12 48 -12" fill="none" stroke="#a06a3c" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
  <!-- interior gloss highlight -->
  <ellipse cx="108" cy="110" rx="20" ry="8" fill="#5a3a22" opacity="0.6"/>
</svg>
