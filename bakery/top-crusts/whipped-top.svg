<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="whipped-base" cx="46%" cy="40%" r="66%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#fffaf2"/>
      <stop offset="100%" stop-color="#f0e4d2"/>
    </radialGradient>
    <linearGradient id="whipped-crust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eac177"/>
      <stop offset="100%" stop-color="#bd8537"/>
    </linearGradient>
    <linearGradient id="whipped-swirl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3e7d6"/>
    </linearGradient>
  </defs>
  <ellipse cx="128" cy="220" rx="84" ry="13" fill="#000" opacity="0.11"/>
  <!-- crust rim peeking under cream -->
  <circle cx="128" cy="122" r="92" fill="url(#whipped-crust)" stroke="#9a5f25" stroke-width="6"/>
  <!-- whipped cream covering -->
  <circle cx="128" cy="120" r="82" fill="url(#whipped-base)" stroke="#caa46f" stroke-width="5"/>
  <!-- piped edge: ring of cream rosette bumps -->
  <g fill="url(#whipped-swirl)" stroke="#caa46f" stroke-width="4" stroke-linejoin="round">
    <circle cx="128" cy="44" r="14"/>
    <circle cx="165" cy="51" r="14"/>
    <circle cx="194" cy="73" r="14"/>
    <circle cx="208" cy="108" r="14"/>
    <circle cx="205" cy="146" r="14"/>
    <circle cx="186" cy="178" r="14"/>
    <circle cx="156" cy="197" r="14"/>
    <circle cx="128" cy="200" r="14"/>
    <circle cx="100" cy="197" r="14"/>
    <circle cx="70" cy="178" r="14"/>
    <circle cx="51" cy="146" r="14"/>
    <circle cx="48" cy="108" r="14"/>
    <circle cx="62" cy="73" r="14"/>
    <circle cx="91" cy="51" r="14"/>
  </g>
  <!-- piped rosette dimples -->
  <g fill="#e7d6bd" opacity="0.6">
    <circle cx="128" cy="44" r="4"/>
    <circle cx="165" cy="51" r="4"/>
    <circle cx="194" cy="73" r="4"/>
    <circle cx="208" cy="108" r="4"/>
    <circle cx="205" cy="146" r="4"/>
    <circle cx="186" cy="178" r="4"/>
    <circle cx="156" cy="197" r="4"/>
    <circle cx="100" cy="197" r="4"/>
    <circle cx="70" cy="178" r="4"/>
    <circle cx="51" cy="146" r="4"/>
    <circle cx="48" cy="108" r="4"/>
    <circle cx="62" cy="73" r="4"/>
    <circle cx="91" cy="51" r="4"/>
  </g>
  <!-- central swirl of whipped cream -->
  <path fill="none" stroke="#caa46f" stroke-width="6" stroke-linecap="round"
    d="M128 156
       a30 30 0 1 1 22 -52
       a22 22 0 1 1 -34 36
       a14 14 0 1 1 22 -18
       a7 7 0 1 1 -10 10"/>
  <!-- swirl highlight -->
  <path fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.8"
    d="M120 150
       a26 26 0 0 1 -8 -40"/>
  <!-- top shine -->
  <ellipse cx="104" cy="98" rx="16" ry="10" fill="#fff" opacity="0.55" transform="rotate(-28 104 98)"/>
</svg>
