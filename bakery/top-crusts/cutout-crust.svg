<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="cutout-top" cx="46%" cy="40%" r="64%">
      <stop offset="0%" stop-color="#f3d294"/>
      <stop offset="60%" stop-color="#e2b260"/>
      <stop offset="100%" stop-color="#c98f3c"/>
    </radialGradient>
    <linearGradient id="cutout-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eac177"/>
      <stop offset="100%" stop-color="#bd8537"/>
    </linearGradient>
    <radialGradient id="cutout-fill" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#a8327a"/>
      <stop offset="100%" stop-color="#7a1f57"/>
    </radialGradient>
    <clipPath id="cutout-clip">
      <circle cx="128" cy="120" r="80"/>
    </clipPath>
  </defs>
  <ellipse cx="128" cy="220" rx="84" ry="13" fill="#000" opacity="0.11"/>
  <!-- filling layer underneath -->
  <circle cx="128" cy="120" r="84" fill="url(#cutout-fill)"/>
  <!-- pie crust rim -->
  <circle cx="128" cy="120" r="92" fill="none" stroke="#9a5f25" stroke-width="6"/>
  <circle cx="128" cy="120" r="92" fill="url(#cutout-rim)" stroke="#9a5f25" stroke-width="6" opacity="0"/>
  <!-- top crust with cutouts (use even-odd to punch holes) -->
  <path fill="url(#cutout-top)" stroke="#9a5f25" stroke-width="6" fill-rule="evenodd" d="
    M128 40
    a80 80 0 1 0 0.1 0
    Z
    M128 74
    l6 13 14 1 -11 9 4 14 -13 -8 -13 8 4 -14 -11 -9 14 -1 z
    M92 132
    l5 11 12 1 -9 8 3 12 -11 -7 -11 7 3 -12 -9 -8 12 -1 z
    M168 138
    c5 -6 14 -2 14 6 c0 6 -7 11 -14 16 c-7 -5 -14 -10 -14 -16 c0 -8 9 -12 14 -6 z
    M122 168
    c4 -5 12 -2 12 5 c0 5 -6 9 -12 14 c-6 -5 -12 -9 -12 -14 c0 -7 8 -10 12 -5 z
  "/>
  <!-- rim crust drawn over filling band so edge reads as crust ring -->
  <g clip-path="url(#cutout-clip)"></g>
  <!-- decorative outer rim crimp ring -->
  <circle cx="128" cy="120" r="80" fill="none" stroke="#c98f3c" stroke-width="4" opacity="0.5"/>
  <!-- filling shine inside star cutout -->
  <circle cx="128" cy="84" r="2.5" fill="#d56aa8" opacity="0.8"/>
  <!-- top crust shine -->
  <path d="M84 84 q26 -28 60 -22" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
</svg>
