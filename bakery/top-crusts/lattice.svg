<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="lattice-crust" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#f0c98a"/>
      <stop offset="100%" stop-color="#d99a3f"/>
    </radialGradient>
    <linearGradient id="lattice-strip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eeb868"/>
      <stop offset="100%" stop-color="#d4933e"/>
    </linearGradient>
    <radialGradient id="lattice-fill" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e8503a"/>
      <stop offset="100%" stop-color="#bd2c20"/>
    </radialGradient>
    <clipPath id="lattice-clip">
      <circle cx="128" cy="120" r="84"/>
    </clipPath>
  </defs>
  <ellipse cx="128" cy="220" rx="84" ry="13" fill="#000" opacity="0.11"/>
  <!-- outer pie crust rim -->
  <circle cx="128" cy="120" r="92" fill="url(#lattice-crust)" stroke="#9a5f25" stroke-width="6"/>
  <!-- red filling background -->
  <circle cx="128" cy="120" r="84" fill="url(#lattice-fill)" stroke="#8e1f17" stroke-width="4"/>
  <g clip-path="url(#lattice-clip)">
    <!-- filling glints -->
    <circle cx="96" cy="98" r="6" fill="#f37a64" opacity="0.7"/>
    <circle cx="150" cy="142" r="5" fill="#f37a64" opacity="0.6"/>
    <circle cx="160" cy="92" r="4" fill="#f37a64" opacity="0.6"/>
    <!-- diagonal woven lattice strips -->
    <g stroke="#9a5f25" stroke-width="4" stroke-linecap="round">
      <!-- one diagonal direction (under) -->
      <g fill="url(#lattice-strip)" opacity="0.95">
        <rect x="40" y="46" width="18" height="180" rx="9" transform="rotate(35 128 120)"/>
        <rect x="74" y="46" width="18" height="180" rx="9" transform="rotate(35 128 120)"/>
        <rect x="108" y="46" width="18" height="180" rx="9" transform="rotate(35 128 120)"/>
        <rect x="142" y="46" width="18" height="180" rx="9" transform="rotate(35 128 120)"/>
        <rect x="176" y="46" width="18" height="180" rx="9" transform="rotate(35 128 120)"/>
      </g>
      <!-- other diagonal direction (over) -->
      <g fill="url(#lattice-strip)">
        <rect x="40" y="46" width="18" height="180" rx="9" transform="rotate(-35 128 120)"/>
        <rect x="74" y="46" width="18" height="180" rx="9" transform="rotate(-35 128 120)"/>
        <rect x="108" y="46" width="18" height="180" rx="9" transform="rotate(-35 128 120)"/>
        <rect x="142" y="46" width="18" height="180" rx="9" transform="rotate(-35 128 120)"/>
        <rect x="176" y="46" width="18" height="180" rx="9" transform="rotate(-35 128 120)"/>
      </g>
    </g>
    <!-- strip highlights -->
    <g transform="rotate(-35 128 120)" opacity="0.55">
      <rect x="46" y="50" width="5" height="170" rx="3" fill="#fbe4b8"/>
      <rect x="114" y="50" width="5" height="170" rx="3" fill="#fbe4b8"/>
      <rect x="182" y="50" width="5" height="170" rx="3" fill="#fbe4b8"/>
    </g>
  </g>
  <!-- crimped outer edge bumps -->
  <g fill="none" stroke="#9a5f25" stroke-width="6" stroke-linecap="round">
    <path d="M128 28 a92 92 0 0 1 0 184" opacity="0"/>
  </g>
  <!-- top crust shine -->
  <path d="M78 70 q24 -26 64 -22" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity="0.4"/>
</svg>
