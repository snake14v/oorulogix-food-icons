<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="powderedsugar-mound" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7c98f"/>
      <stop offset="1" stop-color="#cba35f"/>
    </linearGradient>
    <radialGradient id="powderedsugar-dust" cx="0.5" cy="0.3" r="0.75">
      <stop offset="0" stop-color="#fdfdf7" stop-opacity="0.95"/>
      <stop offset="0.7" stop-color="#fdfdf7" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fdfdf7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="128" cy="222" rx="80" ry="12" fill="#000" opacity="0.11"/>
  <!-- small mound (a dusted treat) -->
  <path d="M60 184 C66 150 92 130 128 130 C164 130 190 150 196 184 C198 196 180 200 128 200 C76 200 58 196 60 184 Z"
        fill="url(#powderedsugar-mound)" stroke="#9a6f33" stroke-width="6" stroke-linejoin="round"/>
  <!-- soft powdered-sugar dust blanket over top -->
  <path d="M64 168 C80 138 102 126 128 126 C154 126 176 138 192 168 C176 156 154 150 128 150 C102 150 80 156 64 168 Z"
        fill="url(#powderedsugar-dust)"/>
  <ellipse cx="128" cy="146" rx="70" ry="26" fill="url(#powderedsugar-dust)"/>
  <!-- scattered sugar specks -->
  <g fill="#fdfdf7">
    <circle cx="92" cy="160" r="4.5"/>
    <circle cx="120" cy="150" r="5.5"/>
    <circle cx="150" cy="158" r="4.5"/>
    <circle cx="170" cy="170" r="3.5"/>
    <circle cx="78" cy="176" r="3.5"/>
    <circle cx="135" cy="172" r="4"/>
    <circle cx="106" cy="178" r="3"/>
    <circle cx="160" cy="180" r="3"/>
  </g>
  <!-- falling specks above -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="100" cy="108" r="3.2"/>
    <circle cx="138" cy="100" r="2.6"/>
    <circle cx="160" cy="116" r="3"/>
    <circle cx="84" cy="124" r="2.4"/>
    <circle cx="176" cy="132" r="2.4"/>
  </g>
</svg>
