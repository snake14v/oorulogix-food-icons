      <stop offset="0" stop-color="#6b3f22"/>
      <stop offset="1" stop-color="#3a2010"/>
    </linearGradient>
  </defs>
  <ellipse cx="128" cy="222" rx="78" ry="12" fill="#000" opacity="0.11"/>
