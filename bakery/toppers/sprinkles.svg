<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="sprinkles-glow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#fff4dd" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#fff4dd" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="128" cy="222" rx="80" ry="12" fill="#000" opacity="0.11"/>
  <ellipse cx="128" cy="128" rx="86" ry="80" fill="url(#sprinkles-glow)"/>
  <!-- dark outline underlay for every sprinkle (gives each a dark edge) -->
  <g stroke-linecap="round" stroke="#3a2412" stroke-width="18">
    <!-- red -->
    <line x1="64" y1="92" x2="86" y2="100"/>
    <line x1="156" y1="70" x2="176" y2="60"/>
    <line x1="100" y1="180" x2="116" y2="196"/>
    <!-- blue -->
    <line x1="110" y1="74" x2="132" y2="76"/>
    <line x1="178" y1="120" x2="198" y2="112"/>
    <line x1="70" y1="150" x2="84" y2="166"/>
    <!-- yellow -->
    <line x1="142" y1="118" x2="164" y2="118"/>
    <line x1="86" y1="124" x2="102" y2="138"/>
    <line x1="156" y1="178" x2="174" y2="168"/>
    <!-- green -->
    <line x1="118" y1="150" x2="138" y2="158"/>
    <line x1="58" y1="124" x2="74" y2="118"/>
    <line x1="184" y1="158" x2="200" y2="170"/>
    <!-- pink -->
    <line x1="124" y1="100" x2="146" y2="94"/>
    <line x1="92" y1="160" x2="110" y2="156"/>
    <line x1="170" y1="92" x2="186" y2="104"/>
  </g>
  <!-- short rounded sprinkles, multicolor, varied angles -->
  <g stroke-linecap="round" stroke-width="13">
    <!-- red -->
    <line x1="64" y1="92" x2="86" y2="100" stroke="#e23b32"/>
    <line x1="156" y1="70" x2="176" y2="60" stroke="#e23b32"/>
    <line x1="100" y1="180" x2="116" y2="196" stroke="#e23b32"/>
    <!-- blue -->
    <line x1="110" y1="74" x2="132" y2="76" stroke="#2f7fd8"/>
    <line x1="178" y1="120" x2="198" y2="112" stroke="#2f7fd8"/>
    <line x1="70" y1="150" x2="84" y2="166" stroke="#2f7fd8"/>
    <!-- yellow -->
    <line x1="142" y1="118" x2="164" y2="118" stroke="#f4c430"/>
    <line x1="86" y1="124" x2="102" y2="138" stroke="#f4c430"/>
    <line x1="156" y1="178" x2="174" y2="168" stroke="#f4c430"/>
    <!-- green -->
    <line x1="118" y1="150" x2="138" y2="158" stroke="#4bb44b"/>
    <line x1="58" y1="124" x2="74" y2="118" stroke="#4bb44b"/>
    <line x1="184" y1="158" x2="200" y2="170" stroke="#4bb44b"/>
    <!-- pink -->
    <line x1="124" y1="100" x2="146" y2="94" stroke="#f06ba8"/>
    <line x1="92" y1="160" x2="110" y2="156" stroke="#f06ba8"/>
    <line x1="170" y1="92" x2="186" y2="104" stroke="#f06ba8"/>
  </g>
  <!-- tiny glossy dots -->
  <g fill="#fff" opacity="0.6">
    <circle cx="72" cy="95" r="2.6"/>
    <circle cx="150" cy="116" r="2.6"/>
    <circle cx="128" cy="153" r="2.6"/>
    <circle cx="164" cy="64" r="2.6"/>
    <circle cx="106" cy="184" r="2.6"/>
  </g>
</svg>
