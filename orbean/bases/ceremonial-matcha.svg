<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <ellipse cx="128" cy="226" rx="60" ry="11" fill="#000" opacity="0.12"/>
  <defs>
    <linearGradient id="matcha_bowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2EAD8"/>
      <stop offset="1" stop-color="#E2D5BC"/>
    </linearGradient>
    <radialGradient id="matcha_mound" cx="0.4" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#86B86A"/>
      <stop offset="1" stop-color="#6F9E55"/>
    </radialGradient>
    <clipPath id="matcha_bowlclip">
      <path d="M70 150 Q70 200 128 200 Q186 200 186 150 Z"/>
    </clipPath>
  </defs>
  <!-- bamboo whisk (chasen) behind mound -->
  <g stroke="#C9A86B" stroke-width="5" stroke-linecap="round">
    <rect x="150" y="48" width="18" height="60" rx="6" fill="#D8BC84" stroke="#9c7d44" stroke-width="5"/>
    <path d="M152 104 L146 150" />
    <path d="M159 108 L159 152" />
    <path d="M166 104 L172 150" />
    <path d="M155 106 L150 150" opacity="0.8"/>
    <path d="M163 106 L168 150" opacity="0.8"/>
  </g>
  <!-- bowl -->
  <path d="M70 150 Q70 200 128 200 Q186 200 186 150 Z" fill="url(#matcha_bowl)" stroke="#5a4a35" stroke-width="6" stroke-linejoin="round"/>
  <path d="M62 150 L194 150" stroke="#5a4a35" stroke-width="6" stroke-linecap="round"/>
  <!-- bowl inner rim shadow -->
  <path d="M70 150 Q128 168 186 150" fill="none" stroke="#cdbfa3" stroke-width="4" opacity="0.4"/>
  <!-- matcha mound -->
  <path d="M84 150 Q92 116 128 116 Q164 116 172 150 Z" fill="url(#matcha_mound)" stroke="#4f7a3a" stroke-width="6" stroke-linejoin="round"/>
  <!-- mound highlight -->
  <path d="M104 134 Q116 124 132 126" fill="none" stroke="#aed492" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <!-- powder texture dots -->
  <circle cx="112" cy="142" r="2.5" fill="#5e8a47"/>
  <circle cx="140" cy="138" r="2" fill="#5e8a47"/>
  <circle cx="126" cy="146" r="2" fill="#5e8a47"/>
  <circle cx="150" cy="144" r="2" fill="#5e8a47"/>
  <!-- bowl highlight -->
  <path d="M80 170 Q84 186 100 192" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
