  </defs>

  <!-- contact shadow -->
  <ellipse cx="128" cy="214" rx="84" ry="15" fill="#43291a" opacity="0.18"/>

  <!-- BOTTOM BUN -->
  <path d="M58 180 C58 198 84 208 128 208 C172 208 198 198 198 180 L198 172 C198 170 196 168 192 168 L64 168 C60 168 58 170 58 172 Z"
