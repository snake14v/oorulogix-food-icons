<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="paneerburger-bun-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2BE74"/>
      <stop offset="1" stop-color="#E8A95C"/>
    </linearGradient>
    <linearGradient id="paneerburger-base-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8A95C"/>
      <stop offset="1" stop-color="#D38F42"/>
    </linearGradient>
    <linearGradient id="paneerburger-crumb-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8BE76"/>
      <stop offset="1" stop-color="#D49E4E"/>
