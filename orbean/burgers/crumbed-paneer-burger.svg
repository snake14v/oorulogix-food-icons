    <circle cx="80" cy="148" r="2.4"/>
    <circle cx="100" cy="156" r="2"/>
    <circle cx="118" cy="145" r="2.4"/>
    <circle cx="138" cy="155" r="2"/>
    <circle cx="156" cy="146" r="2.4"/>
    <circle cx="176" cy="153" r="2"/>
    <circle cx="92" cy="140" r="1.8"/>
    <circle cx="146" cy="139" r="1.8"/>
  </g>
  <g fill="#F4D894">
    <circle cx="88" cy="152" r="2"/>
    <circle cx="128" cy="150" r="2.2"/>
    <circle cx="166" cy="151" r="2"/>
