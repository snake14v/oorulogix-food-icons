<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="chickenstrips-strip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#edbc63"/>
      <stop offset="1" stop-color="#d8993f"/>
    </linearGradient>
    <linearGradient id="chickenstrips-plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf4e6"/>
      <stop offset="1" stop-color="#ecdcc0"/>
    </linearGradient>
  </defs>

  <!-- contact shadow -->
  <ellipse cx="128" cy="206" rx="80" ry="18" fill="#43291a" opacity="0.18"/>

  <!-- serving board -->
  <ellipse cx="128" cy="180" rx="86" ry="30" fill="url(#chickenstrips-plate)" stroke="#9a5f25" stroke-width="6"/>
  <ellipse cx="128" cy="176" rx="64" ry="18" fill="none" stroke="#d9c39a" stroke-width="4" opacity="0.7"/>

  <!-- bottom strip -->
  <g stroke="#9a5f25" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
    <path d="M64 168 q-8 -22 14 -30 q40 -16 78 -6 q24 6 18 24 q-6 18 -34 22 q-46 6 -76 -10 Z" fill="url(#chickenstrips-strip)"/>
  </g>
  <!-- bottom strip crisp speckles -->
  <g fill="#a9651f" opacity="0.55">
    <circle cx="92" cy="150" r="2.4"/><circle cx="116" cy="158" r="2.2"/>
    <circle cx="140" cy="148" r="2.6"/><circle cx="78" cy="158" r="2"/>
  </g>

  <!-- middle strip -->
  <g stroke="#9a5f25" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
    <path d="M70 142 q-10 -24 16 -33 q42 -16 80 -4 q22 7 16 25 q-7 17 -36 21 q-44 6 -76 -10 Z" fill="#e0a84a"/>
  </g>
  <g fill="#b06d24" opacity="0.5">
    <circle cx="100" cy="124" r="2.6"/><circle cx="126" cy="132" r="2.4"/>
    <circle cx="150" cy="122" r="2.5"/><circle cx="86" cy="132" r="2.2"/>
    <circle cx="138" cy="138" r="2"/>
  </g>

  <!-- top strip -->
  <g stroke="#9a5f25" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
    <path d="M82 116 q-10 -26 18 -34 q40 -14 74 -2 q22 8 15 25 q-8 16 -34 19 q-42 5 -73 -8 Z" fill="url(#chickenstrips-strip)"/>
  </g>
  <g fill="#b06d24" opacity="0.5">
    <circle cx="108" cy="98" r="2.6"/><circle cx="134" cy="104" r="2.4"/>
    <circle cx="156" cy="96" r="2.3"/><circle cx="96" cy="106" r="2.2"/>
  </g>

  <!-- top highlight -->
  <path d="M100 90 q26 -12 56 -3" fill="none" stroke="#f6dca0" stroke-width="6" stroke-linecap="round" opacity="0.85"/>

  <!-- little dip cup -->
  <g stroke="#9a5f25" stroke-width="5" stroke-linejoin="round">
    <path d="M176 178 a20 12 0 1 0 40 0 a20 12 0 1 0 -40 0" fill="#f2e3c9"/>
    <ellipse cx="196" cy="174" rx="13" ry="6" fill="#D9913B"/>
  </g>
  <ellipse cx="192" cy="172" rx="4" ry="2" fill="#f6dca0" opacity="0.8"/>
</svg>
