<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="garlicmushroom-bread" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2B85A"/>
      <stop offset="1" stop-color="#E8A95C"/>
    </linearGradient>
    <linearGradient id="garlicmushroom-cheese" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBD06A"/>
      <stop offset="1" stop-color="#F8BE3C"/>
    </linearGradient>
    <clipPath id="garlicmushroom-clip">
      <path d="M44 120 L196 86 L226 150 L92 188 Z"/>
    </clipPath>
  </defs>
  <ellipse cx="132" cy="206" rx="84" ry="17" fill="#43291a" opacity="0.18"/>
  <!-- cheese drip -->
  <path d="M122 152 q-5 20 4 28 q9 -6 6 -24 Z" fill="url(#garlicmushroom-cheese)" stroke="#9a5f25" stroke-width="5" stroke-linejoin="round"/>
  <!-- bottom bread slice -->
  <path d="M40 132 L190 98 L222 158 L88 196 Z" fill="url(#garlicmushroom-bread)" stroke="#9a5f25" stroke-width="6" stroke-linejoin="round"/>
  <!-- filling layer (cheese base) -->
  <path d="M48 122 L194 88 L222 144 L86 182 Z" fill="url(#garlicmushroom-cheese)" stroke="#9a5f25" stroke-width="6" stroke-linejoin="round"/>
  <g clip-path="url(#garlicmushroom-clip)">
    <!-- sauteed mushrooms -->
    <path d="M96 128 q14 -16 30 -4 q-2 12 -16 14 q-14 1 -14 -10 Z" fill="#D8C2A0" stroke="#8a6a3f" stroke-width="4" stroke-linejoin="round"/>
    <path d="M104 124 q5 -3 11 0" fill="none" stroke="#8a6a3f" stroke-width="3" stroke-linecap="round"/>
    <path d="M142 116 q13 -15 28 -3 q-2 11 -15 13 q-13 1 -13 -10 Z" fill="#CDB58E" stroke="#8a6a3f" stroke-width="4" stroke-linejoin="round"/>
    <path d="M150 112 q5 -3 10 0" fill="none" stroke="#8a6a3f" stroke-width="3" stroke-linecap="round"/>
    <!-- garlic flecks -->
    <circle cx="124" cy="142" r="3" fill="#F4ECDD"/>
    <circle cx="160" cy="132" r="3" fill="#F4ECDD"/>
  </g>
  <!-- top pressed bread slice -->
  <path d="M44 110 L188 76 L208 122 L66 158 Z" fill="url(#garlicmushroom-bread)" stroke="#9a5f25" stroke-width="6" stroke-linejoin="round"/>
  <path d="M72 95 L94 131" stroke="#C77C2E" stroke-width="6" stroke-linecap="round"/>
  <path d="M108 87 L130 123" stroke="#C77C2E" stroke-width="6" stroke-linecap="round"/>
  <path d="M144 79 L166 115" stroke="#C77C2E" stroke-width="6" stroke-linecap="round"/>
  <path d="M52 104 L150 81" stroke="#FFE3A8" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
</svg>
