<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="triplecheese-bread" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2B85A"/>
      <stop offset="1" stop-color="#E8A95C"/>
    </linearGradient>
    <linearGradient id="triplecheese-cheese" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBD06A"/>
      <stop offset="1" stop-color="#F8BE3C"/>
    </linearGradient>
    <clipPath id="triplecheese-clip">
      <path d="M44 120 L196 86 L226 150 L92 188 Z"/>
    </clipPath>
  </defs>
  <!-- contact shadow -->
  <ellipse cx="132" cy="206" rx="84" ry="17" fill="#43291a" opacity="0.18"/>
  <!-- cheese ooze drips -->
  <path d="M118 150 q-6 22 4 30 q10 -6 8 -26 Z" fill="url(#triplecheese-cheese)" stroke="#9a5f25" stroke-width="5" stroke-linejoin="round"/>
  <path d="M158 144 q-3 18 6 24 q8 -5 5 -22 Z" fill="#F8BE3C" stroke="#9a5f25" stroke-width="5" stroke-linejoin="round"/>
  <!-- bottom bread slice -->
  <path d="M40 132 L190 98 L222 158 L88 196 Z" fill="url(#triplecheese-bread)" stroke="#9a5f25" stroke-width="6" stroke-linejoin="round"/>
  <!-- molten cheese layer -->
  <path d="M48 122 L194 88 L222 144 L86 182 Z" fill="url(#triplecheese-cheese)" stroke="#9a5f25" stroke-width="6" stroke-linejoin="round"/>
  <g clip-path="url(#triplecheese-clip)">
    <path d="M70 96 q40 28 90 8" fill="none" stroke="#F4ECDD" stroke-width="9" stroke-linecap="round" opacity="0.85"/>
    <circle cx="110" cy="138" r="9" fill="#F4ECDD"/>
    <circle cx="160" cy="120" r="7" fill="#FFE9A0"/>
  </g>
  <!-- top pressed bread slice -->
  <path d="M44 110 L188 76 L208 122 L66 158 Z" fill="url(#triplecheese-bread)" stroke="#9a5f25" stroke-width="6" stroke-linejoin="round"/>
  <!-- grill press lines -->
  <path d="M70 96 L92 132" stroke="#C77C2E" stroke-width="6" stroke-linecap="round"/>
  <path d="M104 88 L126 124" stroke="#C77C2E" stroke-width="6" stroke-linecap="round"/>
  <path d="M138 80 L160 116" stroke="#C77C2E" stroke-width="6" stroke-linecap="round"/>
  <!-- top highlight -->
  <path d="M52 104 L150 81" stroke="#FFE3A8" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
</svg>
