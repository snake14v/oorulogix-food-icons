<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="regularmilk_body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4ECDD"/>
    </linearGradient>
    <clipPath id="regularmilk_clip">
      <path d="M82 96 L174 96 L174 200 Q174 214 160 214 L96 214 Q82 214 82 200 Z"/>
    </clipPath>
  </defs>

  <ellipse cx="128" cy="226" rx="58" ry="10" fill="#000" opacity="0.12"/>

  <!-- bottle body fill -->
  <g clip-path="url(#regularmilk_clip)">
    <rect x="80" y="90" width="100" height="130" fill="url(#regularmilk_body)"/>
    <rect x="80" y="160" width="100" height="60" fill="#F4ECDD" opacity="0.55"/>
  </g>

  <!-- bottle body outline -->
  <path d="M82 96 L174 96 L174 200 Q174 214 160 214 L96 214 Q82 214 82 200 Z" fill="none" stroke="#5a4a35" stroke-width="6" stroke-linejoin="round"/>

  <!-- shoulder + neck -->
  <path d="M82 96 Q82 78 100 74 L100 56 L156 56 L156 74 Q174 78 174 96" fill="url(#regularmilk_body)" stroke="#5a4a35" stroke-width="6" stroke-linejoin="round"/>

  <!-- cap -->
  <path d="M98 56 L158 56 L158 44 Q158 40 154 40 L102 40 Q98 40 98 44 Z" fill="#F4ECDD" stroke="#5a4a35" stroke-width="6" stroke-linejoin="round"/>

  <!-- milk fill line -->
  <path d="M88 120 L168 120" stroke="#5a4a35" stroke-width="5" stroke-linecap="round" opacity="0.35"/>

  <!-- highlight -->
  <path d="M96 108 L96 200" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
  <path d="M110 64 L148 64" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
</svg>
