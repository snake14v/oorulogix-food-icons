<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="makhani-paneer-crust" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#F0D199"/>
      <stop offset="100%" stop-color="#E8C27A"/>
    </radialGradient>
    <clipPath id="makhani-paneer-clip">
      <circle cx="128" cy="130" r="80"/>
    </clipPath>
  </defs>
  <ellipse cx="128" cy="222" rx="80" ry="14" fill="#43291a" opacity="0.18"/>
  <circle cx="128" cy="130" r="92" fill="url(#makhani-paneer-crust)" stroke="#9a5f25" stroke-width="6"/>
  <!-- orange makhani sauce -->
  <circle cx="128" cy="130" r="80" fill="#D9913B" stroke="#9a5f25" stroke-width="4"/>
  <g clip-path="url(#makhani-paneer-clip)">
    <!-- sauce swirls -->
    <path d="M66 104 q26 10 50 0 t60 6" fill="none" stroke="#C57F2C" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <path d="M64 158 q28 -8 54 4 t58 -6" fill="none" stroke="#C57F2C" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <path d="M70 130 q30 6 58 -2 t52 4" fill="none" stroke="#E8A85A" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <!-- pale paneer cubes -->
    <g fill="#F2E3C9" stroke="#9a5f25" stroke-width="5" stroke-linejoin="round">
      <rect x="88" y="84" width="26" height="24" rx="4"/>
      <rect x="150" y="96" width="25" height="23" rx="4"/>
      <rect x="96" y="150" width="26" height="24" rx="4"/>
      <rect x="152" y="152" width="24" height="22" rx="4"/>
      <rect x="120" y="120" width="24" height="22" rx="4"/>
    </g>
    <!-- paneer char highlights -->
    <g fill="#FFFFFF" opacity="0.5">
      <rect x="92" y="88" width="10" height="6" rx="2"/>
      <rect x="154" y="100" width="9" height="6" rx="2"/>
      <rect x="100" y="154" width="10" height="6" rx="2"/>
      <rect x="124" y="124" width="9" height="6" rx="2"/>
    </g>
    <g fill="#C99A52" opacity="0.6">
      <rect x="104" y="98" width="6" height="5" rx="2"/>
      <rect x="166" y="108" width="5" height="5" rx="2"/>
      <rect x="112" y="164" width="6" height="5" rx="2"/>
    </g>
    <!-- onion slivers -->
    <g fill="none" stroke="#E7D7E8" stroke-width="4" stroke-linecap="round">
      <path d="M76 122 q16 -8 30 -2"/>
      <path d="M134 84 q14 6 24 -2"/>
      <path d="M126 168 q16 8 32 0"/>
      <path d="M80 158 q12 6 24 2"/>
    </g>
    <!-- coriander flecks -->
    <g fill="#4f8a2e">
      <circle cx="118" cy="100" r="3"/>
      <circle cx="140" cy="138" r="3"/>
      <circle cx="90" cy="132" r="3"/>
      <circle cx="160" cy="132" r="3"/>
      <circle cx="108" cy="172" r="3"/>
      <circle cx="146" cy="90" r="2.6"/>
      <circle cx="128" cy="160" r="2.6"/>
