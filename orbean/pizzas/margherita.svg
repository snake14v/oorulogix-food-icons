<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="margherita-crust" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#F0D199"/>
      <stop offset="100%" stop-color="#E8C27A"/>
    </radialGradient>
    <clipPath id="margherita-clip">
      <circle cx="128" cy="130" r="84"/>
