    <ellipse cx="92" cy="88" rx="8" ry="5" fill="#FFFFFF" opacity="0.6"/>
    <ellipse cx="166" cy="108" rx="20" ry="16" fill="#F4ECDD" stroke="#9a5f25" stroke-width="5"/>
    <ellipse cx="160" cy="103" rx="7" ry="4" fill="#FFFFFF" opacity="0.6"/>
    <ellipse cx="104" cy="168" rx="21" ry="16" fill="#F4ECDD" stroke="#9a5f25" stroke-width="5"/>
    <ellipse cx="98" cy="164" rx="7" ry="4" fill="#FFFFFF" opacity="0.6"/>
    <ellipse cx="164" cy="166" rx="18" ry="14" fill="#F4ECDD" stroke="#9a5f25" stroke-width="5"/>
    <ellipse cx="132" cy="132" rx="17" ry="13" fill="#F4ECDD" stroke="#9a5f25" stroke-width="5"/>
