    <path d="M70 90 q20 8 40 -2 t44 6" fill="none" stroke="#A93226" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <path d="M64 168 q24 -6 50 4 t60 -4" fill="none" stroke="#A93226" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
